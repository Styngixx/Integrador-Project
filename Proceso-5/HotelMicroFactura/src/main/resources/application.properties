spring.application.name=MicroFactura
server.port=8083

# Configuración básica de H2 en archivo
spring.datasource.url=jdbc:h2:file:./data/ArticuloBD;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update

# Registro en Eureka server
eureka.client.service-url.default-zone=http://localhost:8761/eureka